<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- body -->
  <circle cx="50" cy="56" r="42" fill="#ff99cc"/>

  <!-- left eye -->
  <g transform="rotate(-9, 30, 44)">
    <ellipse cx="30" cy="44" rx="12" ry="22" fill="#111"/>
    <ellipse cx="27" cy="33" rx="5.5" ry="11" fill="#fff"/>
    <ellipse cx="31" cy="60" rx="5" ry="3.8" fill="#2277bb"/>
  </g>

  <!-- right eye -->
  <g transform="rotate(9, 70, 44)">
    <ellipse cx="70" cy="44" rx="12" ry="22" fill="#111"/>
    <ellipse cx="73" cy="33" rx="5.5" ry="11" fill="#fff"/>
    <ellipse cx="69" cy="60" rx="5" ry="3.8" fill="#2277bb"/>
  </g>

  <!-- cheeks -->
  <ellipse cx="13" cy="65" rx="12" ry="7.5" fill="#e0406a" opacity="0.85"/>
  <ellipse cx="87" cy="65" rx="12" ry="7.5" fill="#e0406a" opacity="0.85"/>

  <!-- smile -->
  <path d="M 38 76 Q 50 88 62 76" stroke="#222" stroke-width="2.5" fill="none" stroke-linecap="round"/>

  <!-- feet -->
  <ellipse cx="36" cy="95" rx="15" ry="8" fill="#cc2244"/>
  <ellipse cx="64" cy="95" rx="15" ry="8" fill="#cc2244"/>
</svg>
