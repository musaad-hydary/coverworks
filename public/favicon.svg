<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- body -->
  <circle cx="50" cy="50" r="48" fill="#ff99cc"/>

  <!-- left eye -->
  <g transform="rotate(-9, 34, 47)">
    <ellipse cx="34" cy="47" rx="9" ry="16" fill="#111"/>
    <ellipse cx="31.5" cy="39" rx="4" ry="8" fill="#fff"/>
    <ellipse cx="35" cy="58" rx="3.8" ry="2.8" fill="#2277bb"/>
  </g>

  <!-- right eye -->
  <g transform="rotate(9, 66, 47)">
    <ellipse cx="66" cy="47" rx="9" ry="16" fill="#111"/>
    <ellipse cx="68.5" cy="39" rx="4" ry="8" fill="#fff"/>
    <ellipse cx="65" cy="58" rx="3.8" ry="2.8" fill="#2277bb"/>
  </g>

  <!-- cheeks -->
  <ellipse cx="20" cy="62" rx="9" ry="5.5" fill="#e0406a" opacity="0.85"/>
  <ellipse cx="80" cy="62" rx="9" ry="5.5" fill="#e0406a" opacity="0.85"/>

  <!-- smile -->
  <path d="M 40 70 Q 50 79 60 70" stroke="#222" stroke-width="2" fill="none" stroke-linecap="round"/>
</svg>
